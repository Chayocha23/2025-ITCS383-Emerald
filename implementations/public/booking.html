<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book a desk at SpaceHub co-working space.">
    <title>Book a Desk — SpaceHub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">
        <nav class="dashboard__nav">
            <a href="index.html" class="dashboard__nav-logo">
                <div class="navbar__logo-icon" style="width:32px;height:32px;font-size:0.9rem;">⬡</div>
                SpaceHub
            </a>
            <div class="dashboard__nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="booking.html" class="nav-link nav-link--active">Book</a>
                <a href="my-bookings.html" class="nav-link">My Bookings</a>
            </div>
            <div class="profile-menu">
                <button class="profile-menu__avatar" onclick="toggleProfileMenu()">
                    <span id="avatarInitial">U</span>
                </button>
                <div class="profile-menu__dropdown" id="profileDropdown">
                    <a href="profile.html" class="profile-menu__item">
                        <span class="profile-menu__item-icon">👤</span> Profile
                    </a>
                    <button class="profile-menu__item profile-menu__item--danger" onclick="handleLogout()">
                        <span class="profile-menu__item-icon">🚪</span> Sign Out
                    </button>
                </div>
            </div>
        </nav>

        <div class="dashboard__content">
            <div class="dashboard__welcome">
                <h1>Book a Desk</h1>
                <p>Select a date, time slot, and number of desks to reserve your workspace.</p>
                <!-- Add red  text-->
                <p style="color: red; font-size: 0.9rem; margin-top: 8px;">* This reservation is for booking only. Please pay at the counter to claim your table.</p>
            </div>

            <!-- Step 1: Date & Settings -->
            <div class="booking-section">
                <h2 class="booking-section__title">1. Select Date & Desks </h2>
                <div class="booking-form-row">
                    <div class="form-group">
                        <label for="bookingDate">Date</label>
                        <input type="date" id="bookingDate" required>
                    </div>
                    <div class="form-group">
                        <label for="numDesks">Number of Desks</label>
                        <div class="duration-picker__row">
                            <button class="duration-picker__btn" onclick="changeDesks(-1)">−</button>
                            <input type="number" id="numDesks" value="1" min="1" max="50"
                                style="width:72px;height:44px;text-align:center;border:1.5px solid var(--gray-200);border-radius:10px;font-size:1.1rem;font-weight:600;">
                            <button class="duration-picker__btn" onclick="changeDesks(1)">+</button>
                        </div>
                    </div>
                </div>
                <button class="btn-apply" onclick="checkAvailability()" id="checkBtn">Check Availability</button>
            </div>

            <!-- Step 2: Time Slot -->
            <div class="booking-section" id="slotSection" style="display:none;">
                <h2 class="booking-section__title">2. Select Time Slot</h2>
                <div class="slot-grid" id="slotGrid"></div>
                <button class="btn-apply" onclick="createBooking()" id="bookBtn" style="margin-top:20px;" disabled>Book
                    Selected Slot</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        const currentUser = requireAuth(['customer']);
        if (currentUser) {
            document.getElementById('avatarInitial').textContent = currentUser.firstName.charAt(0).toUpperCase();
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('bookingDate').min = tomorrow.toISOString().split('T')[0];
            document.getElementById('bookingDate').value = tomorrow.toISOString().split('T')[0];
        }

        let selectedSlot = null;

        function changeDesks(delta) {
            const input = document.getElementById('numDesks');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            if (val > 50) val = 50;
            input.value = val;
        }

        async function checkAvailability() {
            const date = document.getElementById('bookingDate').value;
            if (!date) { showToast('Please select a date.', 'error'); return; }

            const btn = document.getElementById('checkBtn');
            btn.textContent = 'Checking...';
            btn.classList.add('loading');

            try {
                const res = await fetch(`/api/bookings/availability?date=${date}`);
                const data = await res.json();

                const numDesks = parseInt(document.getElementById('numDesks').value);
                const grid = document.getElementById('slotGrid');
                grid.innerHTML = data.slots.map(slot => {
                    const available = slot.availableDesks >= numDesks;
                    return `
                        <button class="slot-card ${available ? 'slot-card--available' : 'slot-card--unavailable'}"
                                ${available ? `onclick="selectSlot(this, '${slot.startTime}', '${slot.endTime}')"` : 'disabled'}
                                data-start="${slot.startTime}" data-end="${slot.endTime}">
                            <div class="slot-card__time">${slot.label}</div>
                            <div class="slot-card__info">${slot.availableDesks} / ${slot.totalDesks} desks free</div>
                            <div class="slot-card__status">${available ? 'Available' : 'Full'}</div>
                        </button>
                    `;
                }).join('');

                document.getElementById('slotSection').style.display = 'block';
                document.getElementById('bookBtn').disabled = true;
                selectedSlot = null;
            } catch (err) {
                showToast('Failed to check availability.', 'error');
            }
            btn.textContent = 'Check Availability';
            btn.classList.remove('loading');
        }

        function selectSlot(el, startTime, endTime) {
            document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('slot-card--selected'));
            el.classList.add('slot-card--selected');
            selectedSlot = { startTime, endTime };
            document.getElementById('bookBtn').disabled = false;
        }

        async function createBooking() {
            if (!selectedSlot) { showToast('Please select a time slot.', 'error'); return; }

            const btn = document.getElementById('bookBtn');
            btn.textContent = 'Booking...';
            btn.classList.add('loading');

            try {
                const res = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        date: document.getElementById('bookingDate').value,
                        startTime: selectedSlot.startTime,
                        endTime: selectedSlot.endTime,
                        numDesks: parseInt(document.getElementById('numDesks').value)
                    })
                });
                const data = await res.json();

                if (!res.ok) { showToast(data.error, 'error'); btn.textContent = 'Book Selected Slot'; btn.classList.remove('loading'); return; }

                // Store payment data in sessionStorage for the payment page
                const bookingDate = document.getElementById('bookingDate').value;
                const numDesksVal = parseInt(document.getElementById('numDesks').value);
                sessionStorage.setItem('pendingPayment', JSON.stringify({
                    type: 'booking',
                    id: data.booking.id,
                    date: bookingDate,
                    startTime: selectedSlot.startTime,
                    endTime: selectedSlot.endTime,
                    numDesks: numDesksVal,
                    amount: numDesksVal * 15,
                    expiresAt: data.booking.expires_at
                }));

                showToast('Booking created! Redirecting to payment...', 'success');
                setTimeout(() => {
                    window.location.href = `payment.html?type=booking&id=${data.booking.id}`;
                }, 800);
            } catch (err) {
                showToast('Connection error.', 'error');
                btn.textContent = 'Book Selected Slot';
                btn.classList.remove('loading');
            }
        }
    </script>
</body>

</html>
