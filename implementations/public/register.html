<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your SpaceHub co-working space account.">
    <title>Create Account — SpaceHub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-card__header">
                <div class="auth-card__logo">⬡</div>
                <h1 class="auth-card__title">Create Account</h1>
                <p class="auth-card__subtitle">Join SpaceHub and start working smarter</p>
            </div>

            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+66 81 234 5678" required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" placeholder="Enter your address" required></textarea>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
                </div>

                <button type="submit" class="btn-submit" id="registerBtn">Create Account</button>
            </form>

            <div class="auth-card__footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.classList.add('loading');
            btn.textContent = 'Creating account...';

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phone, address, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error, 'error');
                    btn.classList.remove('loading');
                    btn.textContent = 'Create Account';
                    return;
                }

                showToast('Account created! Redirecting to login...', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1200);
            } catch (err) {
                showToast('Connection error. Please try again.', 'error');
                btn.classList.remove('loading');
                btn.textContent = 'Create Account';
            }
        }
    </script>

</body>

</html>
